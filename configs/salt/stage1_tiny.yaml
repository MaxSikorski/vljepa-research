# SALT Stage 1: V-Pixel MAE Teacher Training
# Reference: SALT (Apple, ICLR 2025) — https://arxiv.org/abs/2509.24317
#
# Smoke test config: ViT-Tiny on CIFAR-10
# Trains encoder + decoder with pixel reconstruction (MSE on masked patches)
# NO EMA, NO target encoder — just supervised pixel reconstruction

model:
  encoder:
    name: vit_tiny
    patch_size: 8
    embed_dim: 192
    depth: 12
    num_heads: 3
    mlp_ratio: 4.0
    img_size: 32
  decoder:
    encoder_embed_dim: 192
    decoder_embed_dim: 96
    decoder_depth: 2
    decoder_num_heads: 3
    patch_size: 8
    in_channels: 3

masking:
  num_targets: 4
  min_target_scale: 0.15
  max_target_scale: 0.2
  min_context_scale: 0.85
  max_context_scale: 1.0
  aspect_ratio: [0.75, 1.5]

training:
  epochs: 2
  batch_size: 64
  norm_pix: true  # MAE-style per-patch normalization
  optimizer:
    name: adamw
    lr: 1.5e-4
    weight_decay: 0.04
    betas: [0.9, 0.95]
    min_lr: 1.0e-6
  gradient_clip: 1.0

data:
  dataset: cifar10
  root: /tmp/cifar10_data
  num_workers: 2
  pin_memory: true

logging:
  log_every: 100
  output_dir: ./experiments/salt_stage1_tiny
